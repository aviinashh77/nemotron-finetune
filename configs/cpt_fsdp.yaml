# ── cpt_fsdp.yaml ─── Long-sequence CPT with FSDP on 2xA100-80GB ──────
# Launch: torchrun --nproc_per_node=2 train_fsdp.py --config configs/cpt_fsdp.yaml

run:
  mode: cpt
  name: cpt_fsdp_longseq
  output_dir: outputs/cpt_fsdp_longseq

model:
  path: /workspace/models/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  torch_dtype: bfloat16
  attn_implementation: eager
  use_cache: false
  use_mamba_kernels: false

quantization:
  enabled: false

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear
  bias: none

data:
  train_path: data/dummy/sample_cpt_100.json
  format: text
  max_seq_length: 5120  # max viable on 2xA100-80GB (78GB peak); 4096 safe
  packing: false
  num_proc: 4

training:
  output_dir: ${run.output_dir}
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  logging_steps: 1
  save_steps: 20
  save_total_limit: 3
  eval_strategy: no
  seed: 42
  dataloader_num_workers: 2
  gradient_checkpointing: true
  optim: adamw_torch

wandb:
  mode: disabled

logging:
  level: INFO
